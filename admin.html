<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Fepam Panificadora</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Header Admin -->
        <header class="admin-header">
           <h1>
                <img src="img/logo.jpeg" alt="Logo" style="height:40px; vertical-align:middle;">
                Painel Admin Fepam
           </h1>
            <a href="index.html" class="btn-voltar">
                <i class="fas fa-arrow-left"></i> Voltar ao Site
            </a>
        </header>

        <!-- Formulário Adicionar Produto -->
        <div class="admin-form">
            <h2><i class="fas fa-plus"></i> Adicionar Novo Produto</h2>
            <form id="produtoForm">
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" required></textarea>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="categoria" required>
                        <option value="pães">Pães</option>
                        <option value="doces">Doces</option>
                        <option value="salgados">Salgados</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="url" id="imagem" placeholder="https://exemplo.com/imagem.jpg" required>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Salvar Produto
                </button>
            </form>
        </div>

        <!-- Lista de Produtos -->
        <div class="admin-lista">
            <h2><i class="fas fa-list"></i> Produtos Cadastrados (<span id="total-produtos">0</span>)</h2>
            <div class="produtos-lista" id="produtos-lista">
                <!-- Produtos serão carregados aqui -->
            </div>
        </div>
    </div>
    <script src="admin-script.js"></script>
</body>
</html>
